<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SigmaLine - Acceso CRM</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            background: linear-gradient(135deg, #005691 0%, #1a252f 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Roboto', sans-serif;
        }
        .login-card {
            background: white;
            border-radius: 20px;
            padding: 40px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
            text-align: center;
        }
        .brand {
            font-size: 2rem;
            font-weight: 900;
            color: #005691;
            margin-bottom: 5px;
            letter-spacing: -1px;
        }
        .subtitle {
            color: #666;
            margin-bottom: 30px;
            font-size: 0.9rem;
        }
        .btn-login {
            background: #00aeef;
            color: white;
            border: none;
            padding: 12px;
            border-radius: 10px;
            font-weight: 600;
            width: 100%;
            margin-top: 15px;
            transition: all 0.3s;
        }
        .btn-login:hover {
            background: #0098d1;
            transform: translateY(-2px);
        }
        .error-msg {
            color: #dc3545;
            font-size: 0.85rem;
            margin-top: 15px;
            display: none;
        }
    </style>
</head>
<body>

    <div class="login-card">
        <div class="brand">SIGMALINE</div>
        <div class="subtitle">Ingreso Seguro al CRM</div>

        <div id="loginForm">
            <div class="mb-3 text-start">
                <label class="form-label text-muted fw-bold" style="font-size: 0.8rem;">Usuario</label>
                <div class="input-group">
                    <span class="input-group-text bg-light border-end-0"><i class="fas fa-user text-muted"></i></span>
                    <input type="text" id="user" class="form-control border-start-0 ps-0" placeholder="admin / ventas / demo">
                </div>
            </div>
            
            <div class="mb-3 text-start">
                <label class="form-label text-muted fw-bold" style="font-size: 0.8rem;">Contraseña</label>
                <div class="input-group">
                    <span class="input-group-text bg-light border-end-0"><i class="fas fa-lock text-muted"></i></span>
                    <input type="password" id="pass" class="form-control border-start-0 ps-0" placeholder="••••••••" onkeypress="if(event.key === 'Enter') attemptLogin(event)">
                </div>
            </div>

            <button onclick="attemptLogin(event)" class="btn-login">INGRESAR AL SISTEMA <i class="fas fa-arrow-right ms-2"></i></button>

            <div id="errorMsg" class="error-msg"><i class="fas fa-exclamation-circle me-1"></i> Usuario o contraseña incorrectos.</div>
        </div>
    </div>

    <script>
        // Sistema ultra-simple de acceso para la demo. 
        // 3 usuarios con sus claves
        const users = {
            'emi': 'sigma2026',
            'gerencia': 'sigma2026',
            'ventas': 'ventas123'
        };

        function attemptLogin(e) {
            e.preventDefault();
            const u = document.getElementById('user').value.toLowerCase().trim();
            const p = document.getElementById('pass').value.trim();
            const err = document.getElementById('errorMsg');

            if (users[u] && users[u] === p) {
                // Login correcto
                err.style.display = 'none';
                // Guardar quién hizo login
                sessionStorage.setItem('active_user', u.charAt(0).toUpperCase() + u.slice(1));
                // Redirigir al CRM real
                window.location.href = 'crm_app.html';
            } else {
                err.style.display = 'block';
                // Animación de error
                const card = document.querySelector('.login-card');
                card.style.transform = 'translateX(5px)';
                setTimeout(() => card.style.transform = 'translateX(-5px)', 50);
                setTimeout(() => card.style.transform = 'translateX(5px)', 100);
                setTimeout(() => card.style.transform = 'translateX(0)', 150);
            }
            return false;
        }
    </script>
</body>
</html>
